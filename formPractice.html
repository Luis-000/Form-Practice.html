<!--    Practicing creating forms     -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Practice</title>
  </head>
  <body>
    <h1>This is a Form Practice</h1>

    <form action="index.php" method="POST" enctype="multipart/form-data">
      <label for="username">username:</label>
      <input
        type="text"
        id="username"
        placeholder="Vaan"
        required
        minlength="6"
        maxlength="15"
      />
      <br />
      <label for="password">Password:</label>
      <input
        type="password"
        id="password"
        required
        minlength="6"
        maxlength="15"
      />
      <br />

      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        required
        minlength="6"
        maxlength="15"
        placeholder="vaanmorningstar@gmail.com"
      />
      <br />

      <label for="phone">phone #:</label>
      <input
        type="tel"
        id="phone"
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{3}"
        placeholder="123-456-7890"
      />
      <br />
      <label for="bday">Birthday: </label>
      <input type="date" id="bday" />
      <br />

      <label for="quantity">Quantity: </label>
      <input type="number" id="quantity" min="0" max="99" value="1" />
      <br />

      <label for="Mr.">Mr. </label>
      <input type="radio" id="Mr." value="Mr." name="title" />
      <label for="Ms.">Ms. </label>
      <input type="radio" id="Ms." value="Ms." name="title" />
      <label for="PhS.">PhD. </label>
      <input type="radio" id="PhD." value="PhD." name="title" />
      <br />

      <label for="payment">Payment</label>
      <select id="payment">
        <option value="visa">Visa</option>
        <option value="mastercard">Mastercard</option>
        <option value="giftcard">Gift Card</option>
      </select>
      <br />

      <label for="check">Check</label>
      <input type="checkbox" id="check" /> <br />

      <label for="comment">Comment</label>
      <textarea id="comment" rows="3" cols="25"></textarea><br />

      <label for="file">File</label>
      <input type="file" id="file" accept="image/png, image/jpeg" /><br />

      <br /><input type="reset" /><br />
      <input type="submit" />
    </form>
  </body>
</html>
